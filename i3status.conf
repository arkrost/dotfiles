general {
	output_format = "i3bar"
        colors = true
	color_good = "#859900"
	color_degraded = "#b58900"
	color_bad = "#dc322f"
	interval = 1
}

order += "ethernet eth0"
order += "cpu_temperature 0"
order += "volume master"
order += "time"

time {
	format = "%Y-%m-%d %H:%M:%S"
}

ethernet eth0 {
	format_up = "☇up"
	format_down = ""
}

cpu_temperature 0 {
	format = "cpu: %degrees°C"
}

volume master {
  format = "♪: %volume"
  device = "default"
  mixer = "Master"
  mixer_idx = 0
}
